name: Crawl Instagram & Summarize

on:
  workflow_dispatch:
  schedule:
    # KST 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 (UTC = KST - 9)
    - cron: '0 21 * * *'   # KST 06:00 (전날 UTC 21:00)
    - cron: '0 0 * * *'    # KST 09:00
    - cron: '0 3 * * *'    # KST 12:00
    - cron: '0 6 * * *'    # KST 15:00
    - cron: '0 9 * * *'    # KST 18:00
    - cron: '0 12 * * *'   # KST 21:00

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawling pipeline
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: python execution/run_crawl.py
