name: Crawl Instagram & Summarize

on:
  workflow_dispatch:
  schedule:
    # KST 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 (원래 기준시각)
    # GitHub Actions 대기열 지연 보정을 위해 각 시간보다 40분 일찍(XX:20) 실행하도록 당김.
    - cron: '20 20 * * *'  # KST 05:20 (전날 UTC 20:20)
    - cron: '20 23 * * *'  # KST 08:20 (전날 UTC 23:20)
    - cron: '20 2 * * *'   # KST 11:20 (UTC 02:20)
    - cron: '20 5 * * *'   # KST 14:20 (UTC 05:20)
    - cron: '20 8 * * *'   # KST 17:20 (UTC 08:20)
    - cron: '20 11 * * *'  # KST 20:20 (UTC 11:20)

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawling pipeline
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: python execution/run_crawl.py
